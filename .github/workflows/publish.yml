name: publish
run-name: "publish patch from ${{ github.sha }}"

on:
  workflow_dispatch:

concurrency:
  group: npm-publish
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  plan:
    if: github.repository == 'panwar-stack/oc2'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      version: ${{ steps.find.outputs.version || steps.create.outputs.version }}
      tag: ${{ steps.find.outputs.tag || steps.create.outputs.tag }}
      complete: ${{ steps.find.outputs.complete }}
    steps:
      - name: Verify main dispatch
        shell: bash
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "workflow must be dispatched from refs/heads/main, got ${GITHUB_REF}" >&2
            exit 1
          fi

      - name: Checkout release commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Find release for source commit
        id: find
        shell: bash
        working-directory: packages/opencode
        env:
          GH_TOKEN: ${{ github.token }}
          MARKER: <!-- oc2-release-source:${{ github.sha }} -->
          RELEASES_FILE: ${{ runner.temp }}/oc2-releases.json
        run: |
          set -euo pipefail
          gh api --paginate --slurp "repos/${GITHUB_REPOSITORY}/releases?per_page=100" > "$RELEASES_FILE"

          node <<'NODE'
          const fs = require("node:fs")
          const semver = require("semver")

          const pages = JSON.parse(fs.readFileSync(process.env.RELEASES_FILE, "utf8"))
          if (!Array.isArray(pages) || pages.some((page) => !Array.isArray(page))) {
            throw new Error("unexpected GitHub Releases response")
          }
          const matches = pages.flat().filter((release) =>
            typeof release.body === "string" && release.body.includes(process.env.MARKER),
          )
          if (matches.length > 1) throw new Error(`found ${matches.length} Releases for source commit`)
          const workflowDrafts = pages.flat().filter((release) =>
            release.draft &&
            typeof release.body === "string" &&
            release.body.includes("<!-- oc2-release-source:"),
          )
          if (matches.length === 0 && workflowDrafts.length > 0) {
            const tags = workflowDrafts.map((release) => release.tag_name).join(", ")
            throw new Error(`finish workflow draft Releases before allocating another version: ${tags}`)
          }

          const output = [`complete=${matches.length === 1 && !matches[0].draft}`]
          if (matches.length === 0) {
            output.push("state=missing")
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `${output.join("\n")}\n`)
            process.exit(0)
          }

          const release = matches[0]
          const tag = release.tag_name
          const version = typeof tag === "string" && tag.startsWith("v") ? tag.slice(1) : ""
          if (`v${version}` !== tag || semver.valid(version) !== version || semver.prerelease(version) !== null) {
            throw new Error(`Release tag must be canonical stable semver, got ${JSON.stringify(tag)}`)
          }
          if (release.prerelease) throw new Error(`Release ${tag} must not be a prerelease`)
          output.push(`state=${release.draft ? "draft" : "published"}`, `tag=${tag}`, `version=${version}`)
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `${output.join("\n")}\n`)
          NODE

      - name: Allocate patch and create draft release
        if: steps.find.outputs.state == 'missing'
        id: create
        shell: bash
        working-directory: packages/opencode
        env:
          GH_TOKEN: ${{ github.token }}
          MARKER: <!-- oc2-release-source:${{ github.sha }} -->
          TAGS_FILE: ${{ runner.temp }}/oc2-tags.txt
          NPM_FILE: ${{ runner.temp }}/oc2-npm-versions.json
          NPM_ERROR_FILE: ${{ runner.temp }}/oc2-npm-error.txt
          ALLOCATION_FILE: ${{ runner.temp }}/oc2-allocation.json
        run: |
          set -euo pipefail
          git ls-remote --tags origin 'refs/tags/v*' > "$TAGS_FILE"

          npm_status=0
          npm view oc2-ai versions --json > "$NPM_FILE" 2> "$NPM_ERROR_FILE" || npm_status=$?
          if [ "$npm_status" -ne 0 ]; then
            if ! grep -Eq '(^|[^[:alnum:]_])E404([^[:alnum:]_]|$)' "$NPM_FILE" "$NPM_ERROR_FILE"; then
              cat "$NPM_ERROR_FILE" >&2
              exit "$npm_status"
            fi
            printf '[]\n' > "$NPM_FILE"
          fi

          node <<'NODE'
          const fs = require("node:fs")
          const semver = require("semver")

          const tags = fs.readFileSync(process.env.TAGS_FILE, "utf8")
            .split(/\r?\n/)
            .filter(Boolean)
            .map((line) => line.split(/\s+/)[1])
            .filter((ref) => typeof ref === "string" && ref.startsWith("refs/tags/v"))
            .map((ref) => ref.slice("refs/tags/v".length).replace(/\^\{\}$/, ""))
          const npmValue = JSON.parse(fs.readFileSync(process.env.NPM_FILE, "utf8"))
          const npmVersions = typeof npmValue === "string" ? [npmValue] : npmValue
          if (!Array.isArray(npmVersions) || npmVersions.some((version) => typeof version !== "string")) {
            throw new Error("unexpected npm versions response")
          }
          const versions = [...new Set([...tags, ...npmVersions])]
            .filter((version) => semver.valid(version) === version && semver.prerelease(version) === null)
            .sort(semver.rcompare)
          const version = semver.inc(versions[0] || "0.0.0", "patch")
          if (!version) throw new Error("could not allocate patch version")
          fs.writeFileSync(process.env.ALLOCATION_FILE, `${JSON.stringify({ version })}\n`)
          NODE

          VERSION=$(node -e 'const fs = require("node:fs"); process.stdout.write(JSON.parse(fs.readFileSync(process.env.ALLOCATION_FILE, "utf8")).version)')
          TAG="v${VERSION}"
          NOTES=$(printf '%s\n\nnpm: https://www.npmjs.com/package/oc2-ai/v/%s' "$MARKER" "$VERSION")
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --draft \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --generate-notes \
            --notes "$NOTES" \
            --fail-on-no-commits
          printf 'version=%s\ntag=%s\n' "$VERSION" "$TAG" >> "$GITHUB_OUTPUT"

      - name: Verify release tag
        shell: bash
        env:
          TAG: ${{ steps.find.outputs.tag || steps.create.outputs.tag }}
        run: |
          set -euo pipefail
          git fetch origin "refs/tags/${TAG}:refs/tags/${TAG}"
          tag_commit=$(git rev-parse "refs/tags/${TAG}^{commit}")
          head_commit=$(git rev-parse HEAD)
          if [ "$tag_commit" != "$GITHUB_SHA" ] || [ "$head_commit" != "$GITHUB_SHA" ]; then
            echo "release tag, checkout, and github.sha must resolve to the same commit" >&2
            exit 1
          fi

  build:
    needs: plan
    if: needs.plan.outputs.complete != 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
    outputs:
      unix-artifact: ${{ steps.artifacts.outputs.unix }}
      windows-artifact: ${{ steps.artifacts.outputs.windows }}
    steps:
      - name: Checkout release commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.sha }}

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Build native packages
        run: ./packages/opencode/script/build.ts
        env:
          OC2_VERSION: ${{ needs.plan.outputs.version }}
          OC2_CHANNEL: latest
          OC2_RELEASE: true
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}

      - name: Validate built package set
        shell: bash
        run: |
          expected=$(printf '%s\n' \
            oc2-darwin-arm64 \
            oc2-darwin-x64 \
            oc2-darwin-x64-baseline \
            oc2-linux-arm64 \
            oc2-linux-arm64-musl \
            oc2-linux-x64 \
            oc2-linux-x64-baseline \
            oc2-linux-x64-baseline-musl \
            oc2-linux-x64-musl \
            oc2-windows-arm64 \
            oc2-windows-x64 \
            oc2-windows-x64-baseline)
          actual=$(find packages/opencode/dist -mindepth 1 -maxdepth 1 -type d -print | sed 's|.*/||' | sort)
          if [ "$actual" != "$expected" ]; then
            echo "unexpected native package set" >&2
            diff -u <(printf '%s\n' "$expected") <(printf '%s\n' "$actual")
            exit 1
          fi

          bun -e 'import { validateNativePackages } from "./packages/opencode/script/publish.ts"; const version = await validateNativePackages("packages/opencode/dist"); if (version !== process.env.OC2_VERSION) throw new Error("built version " + version + " does not match " + process.env.OC2_VERSION)'
        env:
          OC2_VERSION: ${{ needs.plan.outputs.version }}

      - name: Select artifact names
        id: artifacts
        shell: bash
        run: |
          echo "unix=oc2-native-unix-${GITHUB_SHA}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"
          echo "windows=oc2-native-windows-${GITHUB_SHA}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

      - name: Upload Unix native packages
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ steps.artifacts.outputs.unix }}
          if-no-files-found: error
          retention-days: 7
          path: |
            packages/opencode/dist/oc2-darwin-arm64
            packages/opencode/dist/oc2-darwin-x64
            packages/opencode/dist/oc2-darwin-x64-baseline
            packages/opencode/dist/oc2-linux-arm64
            packages/opencode/dist/oc2-linux-arm64-musl
            packages/opencode/dist/oc2-linux-x64
            packages/opencode/dist/oc2-linux-x64-baseline
            packages/opencode/dist/oc2-linux-x64-baseline-musl
            packages/opencode/dist/oc2-linux-x64-musl

      - name: Upload unsigned Windows native packages
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ steps.artifacts.outputs.windows }}
          if-no-files-found: error
          retention-days: 7
          path: |
            packages/opencode/dist/oc2-windows-arm64
            packages/opencode/dist/oc2-windows-x64
            packages/opencode/dist/oc2-windows-x64-baseline

  publish:
    needs: [plan, build]
    if: needs.plan.outputs.complete != 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
    env:
      TRANSFER_DIR: ${{ github.workspace }}/transfer/${{ github.sha }}/${{ github.run_attempt }}/release
    steps:
      - name: Checkout release commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.sha }}

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"

      - name: Verify trusted-publishing npm version
        shell: bash
        run: |
          npm_version=$(npm --version)
          node - "$npm_version" <<'NODE'
          const value = process.argv[2]
          const version = value.split(".").map(Number)
          const valid = version.length === 3 && version.every(Number.isInteger)
          const supported = valid && (version[0] > 11 ||
            version[0] === 11 && (version[1] > 5 || version[1] === 5 && version[2] >= 1))
          if (!supported) {
            console.error(`npm >=11.5.1 is required for trusted publishing, got ${value}`)
            process.exit(1)
          }
          NODE

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Download Unix native packages
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ needs.build.outputs.unix-artifact }}
          path: ${{ env.TRANSFER_DIR }}

      - name: Download unsigned Windows native packages
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ needs.build.outputs.windows-artifact }}
          path: ${{ env.TRANSFER_DIR }}

      - name: Validate publish package set
        shell: bash
        run: |
          expected=$(printf '%s\n' \
            oc2-darwin-arm64 \
            oc2-darwin-x64 \
            oc2-darwin-x64-baseline \
            oc2-linux-arm64 \
            oc2-linux-arm64-musl \
            oc2-linux-x64 \
            oc2-linux-x64-baseline \
            oc2-linux-x64-baseline-musl \
            oc2-linux-x64-musl \
            oc2-windows-arm64 \
            oc2-windows-x64 \
            oc2-windows-x64-baseline)
          actual=$(find "$TRANSFER_DIR" -mindepth 1 -maxdepth 1 -type d -print | sed 's|.*/||' | sort)
          if [ "$actual" != "$expected" ]; then
            echo "unexpected extracted native package set" >&2
            diff -u <(printf '%s\n' "$expected") <(printf '%s\n' "$actual")
            exit 1
          fi

          bun -e 'import { validateNativePackages } from "./packages/opencode/script/publish.ts"; const version = await validateNativePackages(process.env.TRANSFER_DIR); if (version !== process.env.OC2_VERSION) throw new Error("artifact version " + version + " does not match " + process.env.OC2_VERSION)'
          rm -rf packages/opencode/dist
          mv "$TRANSFER_DIR" packages/opencode/dist
        env:
          OC2_VERSION: ${{ needs.plan.outputs.version }}

      - name: Publish native packages and wrapper
        run: ./packages/opencode/script/publish.ts
        env:
          OC2_VERSION: ${{ needs.plan.outputs.version }}
          OC2_CHANNEL: latest
          NPM_CONFIG_PROVENANCE: true

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.plan.outputs.tag }}
          MARKER: <!-- oc2-release-source:${{ github.sha }} -->
          RELEASE_FILE: ${{ runner.temp }}/oc2-release.json
        run: |
          set -euo pipefail
          git fetch origin "refs/tags/${TAG}:refs/tags/${TAG}"
          tag_commit=$(git rev-parse "refs/tags/${TAG}^{commit}")
          head_commit=$(git rev-parse HEAD)
          if [ "$tag_commit" != "$GITHUB_SHA" ] || [ "$head_commit" != "$GITHUB_SHA" ]; then
            echo "release tag, checkout, and github.sha must resolve to the same commit" >&2
            exit 1
          fi

          gh release view "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --json body,isDraft,isPrerelease,tagName > "$RELEASE_FILE"
          node <<'NODE'
          const fs = require("node:fs")
          const release = JSON.parse(fs.readFileSync(process.env.RELEASE_FILE, "utf8"))
          if (release.tagName !== process.env.TAG) throw new Error("Release tag changed before publication")
          if (typeof release.body !== "string" || !release.body.includes(process.env.MARKER)) {
            throw new Error("Release source marker changed before publication")
          }
          if (release.isPrerelease) throw new Error("Release must not be a prerelease")
          if (typeof release.isDraft !== "boolean") throw new Error("unexpected Release draft state")
          NODE
          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false --latest
