name: publish
run-name: "publish oc2-ai@${{ inputs.version }} (${{ inputs.dist-tag }})"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Canonical semver matching the v<version> dispatch tag"
        required: true
        type: string
      dist-tag:
        description: "Lowercase npm dist-tag"
        required: true
        default: latest
        type: string

concurrency:
  group: npm-publish
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    if: github.repository == 'panwar-stack/oc2'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout release commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Verify immutable release ref
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          expected_ref="refs/tags/v${VERSION}"
          if [ "$GITHUB_REF" != "$expected_ref" ]; then
            echo "workflow must be dispatched from ${expected_ref}, got ${GITHUB_REF}" >&2
            exit 1
          fi

          tag_commit=$(git rev-parse "${expected_ref}^{commit}")
          head_commit=$(git rev-parse HEAD)
          if [ "$tag_commit" != "$GITHUB_SHA" ] || [ "$head_commit" != "$GITHUB_SHA" ]; then
            echo "tag, checkout, and github.sha must resolve to the same commit" >&2
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Validate release inputs
        shell: bash
        working-directory: packages/opencode
        env:
          VERSION: ${{ inputs.version }}
          DIST_TAG: ${{ inputs.dist-tag }}
        run: |
          node <<'NODE'
          const npa = require("npm-package-arg")
          const semver = require("semver")
          const version = process.env.VERSION
          const tag = process.env.DIST_TAG

          if (semver.valid(version) !== version) {
            console.error(`version must be canonical semver, got ${JSON.stringify(version)}`)
            process.exit(1)
          }
          const spec = npa(`oc2-ai@${tag}`)
          if (!/^[a-z][a-z0-9._-]{0,63}$/.test(tag) || spec.type !== "tag" || spec.rawSpec !== tag) {
            console.error(`dist-tag must be a safe lowercase non-semver tag, got ${JSON.stringify(tag)}`)
            process.exit(1)
          }
          NODE

  build:
    needs: validate
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      unix-artifact: ${{ steps.artifacts.outputs.unix }}
      windows-artifact: ${{ steps.artifacts.outputs.windows }}
    steps:
      - name: Checkout release commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.sha }}

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Build native packages
        run: ./packages/opencode/script/build.ts
        env:
          OC2_VERSION: ${{ inputs.version }}
          OC2_CHANNEL: ${{ inputs.dist-tag }}

      - name: Validate built package set
        shell: bash
        run: |
          expected=$(printf '%s\n' \
            oc2-darwin-arm64 \
            oc2-darwin-x64 \
            oc2-darwin-x64-baseline \
            oc2-linux-arm64 \
            oc2-linux-arm64-musl \
            oc2-linux-x64 \
            oc2-linux-x64-baseline \
            oc2-linux-x64-baseline-musl \
            oc2-linux-x64-musl \
            oc2-windows-arm64 \
            oc2-windows-x64 \
            oc2-windows-x64-baseline)
          actual=$(find packages/opencode/dist -mindepth 1 -maxdepth 1 -type d -print | sed 's|.*/||' | sort)
          if [ "$actual" != "$expected" ]; then
            echo "unexpected native package set" >&2
            diff -u <(printf '%s\n' "$expected") <(printf '%s\n' "$actual")
            exit 1
          fi

          bun -e 'import { validateNativePackages } from "./packages/opencode/script/publish.ts"; const version = await validateNativePackages("packages/opencode/dist"); if (version !== process.env.OC2_VERSION) throw new Error("built version " + version + " does not match " + process.env.OC2_VERSION)'
        env:
          OC2_VERSION: ${{ inputs.version }}

      - name: Select artifact names
        id: artifacts
        shell: bash
        run: |
          echo "unix=oc2-native-unix-${GITHUB_SHA}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"
          echo "windows=oc2-native-windows-${GITHUB_SHA}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

      - name: Upload Unix native packages
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ steps.artifacts.outputs.unix }}
          if-no-files-found: error
          retention-days: 7
          path: |
            packages/opencode/dist/oc2-darwin-arm64
            packages/opencode/dist/oc2-darwin-x64
            packages/opencode/dist/oc2-darwin-x64-baseline
            packages/opencode/dist/oc2-linux-arm64
            packages/opencode/dist/oc2-linux-arm64-musl
            packages/opencode/dist/oc2-linux-x64
            packages/opencode/dist/oc2-linux-x64-baseline
            packages/opencode/dist/oc2-linux-x64-baseline-musl
            packages/opencode/dist/oc2-linux-x64-musl

      - name: Upload unsigned Windows native packages
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ steps.artifacts.outputs.windows }}
          if-no-files-found: error
          retention-days: 7
          path: |
            packages/opencode/dist/oc2-windows-arm64
            packages/opencode/dist/oc2-windows-x64
            packages/opencode/dist/oc2-windows-x64-baseline

  sign-windows:
    needs: build
    runs-on: blacksmith-4vcpu-windows-2025
    permissions:
      id-token: write
    outputs:
      artifact: ${{ steps.artifact.outputs.name }}
    env:
      TRANSFER_DIR: ${{ github.workspace }}\transfer\${{ github.sha }}\${{ github.run_attempt }}\windows
    steps:
      - name: Download unsigned native packages
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ needs.build.outputs.windows-artifact }}
          path: ${{ env.TRANSFER_DIR }}

      - name: Azure login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Windows binaries
        uses: azure/artifact-signing-action@b443cf8ea4124818d2ea9f043cba29fc3ec47b16 # v1.2.0
        with:
          endpoint: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE }}
          files: |
            ${{ env.TRANSFER_DIR }}\oc2-windows-arm64\bin\oc2.exe
            ${{ env.TRANSFER_DIR }}\oc2-windows-x64\bin\oc2.exe
            ${{ env.TRANSFER_DIR }}\oc2-windows-x64-baseline\bin\oc2.exe
          exclude-environment-credential: true
          exclude-workload-identity-credential: true
          exclude-managed-identity-credential: true
          exclude-shared-token-cache-credential: true
          exclude-visual-studio-credential: true
          exclude-visual-studio-code-credential: true
          exclude-azure-cli-credential: false
          exclude-azure-powershell-credential: true
          exclude-azure-developer-cli-credential: true
          exclude-interactive-browser-credential: true

      - name: Verify Windows signatures
        shell: pwsh
        run: |
          $files = @(
            "$env:TRANSFER_DIR\oc2-windows-arm64\bin\oc2.exe",
            "$env:TRANSFER_DIR\oc2-windows-x64\bin\oc2.exe",
            "$env:TRANSFER_DIR\oc2-windows-x64-baseline\bin\oc2.exe"
          )

          foreach ($file in $files) {
            $signature = Get-AuthenticodeSignature $file
            if ($signature.Status -ne "Valid") {
              throw "Invalid signature for ${file}: $($signature.Status)"
            }
          }

      - name: Select artifact name
        id: artifact
        shell: pwsh
        run: '"name=oc2-native-signed-$env:GITHUB_SHA-$env:GITHUB_RUN_ATTEMPT" >> $env:GITHUB_OUTPUT'

      - name: Upload signed native packages
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ steps.artifact.outputs.name }}
          if-no-files-found: error
          retention-days: 7
          path: |
            ${{ env.TRANSFER_DIR }}\oc2-windows-arm64
            ${{ env.TRANSFER_DIR }}\oc2-windows-x64
            ${{ env.TRANSFER_DIR }}\oc2-windows-x64-baseline

  publish:
    needs:
      - build
      - sign-windows
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    env:
      TRANSFER_DIR: ${{ github.workspace }}/transfer/${{ github.sha }}/${{ github.run_attempt }}/release
    steps:
      - name: Checkout release commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.sha }}

      - name: Setup Node and npm registry
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - name: Verify trusted-publishing npm version
        shell: bash
        run: |
          npm_version=$(npm --version)
          node - "$npm_version" <<'NODE'
          const value = process.argv[2]
          const version = value.split(".").map(Number)
          const valid = version.length === 3 && version.every(Number.isInteger)
          const supported = valid && (version[0] > 11 ||
            version[0] === 11 && (version[1] > 5 || version[1] === 5 && version[2] >= 1))
          if (!supported) {
            console.error(`npm >=11.5.1 is required for trusted publishing, got ${value}`)
            process.exit(1)
          }
          NODE

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Download Unix native packages
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ needs.build.outputs.unix-artifact }}
          path: ${{ env.TRANSFER_DIR }}

      - name: Download signed Windows native packages
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ needs.sign-windows.outputs.artifact }}
          path: ${{ env.TRANSFER_DIR }}

      - name: Validate publish package set
        shell: bash
        run: |
          expected=$(printf '%s\n' \
            oc2-darwin-arm64 \
            oc2-darwin-x64 \
            oc2-darwin-x64-baseline \
            oc2-linux-arm64 \
            oc2-linux-arm64-musl \
            oc2-linux-x64 \
            oc2-linux-x64-baseline \
            oc2-linux-x64-baseline-musl \
            oc2-linux-x64-musl \
            oc2-windows-arm64 \
            oc2-windows-x64 \
            oc2-windows-x64-baseline)
          actual=$(find "$TRANSFER_DIR" -mindepth 1 -maxdepth 1 -type d -print | sed 's|.*/||' | sort)
          if [ "$actual" != "$expected" ]; then
            echo "unexpected extracted native package set" >&2
            diff -u <(printf '%s\n' "$expected") <(printf '%s\n' "$actual")
            exit 1
          fi

          bun -e 'import { validateNativePackages } from "./packages/opencode/script/publish.ts"; const version = await validateNativePackages(process.env.TRANSFER_DIR); if (version !== process.env.OC2_VERSION) throw new Error("artifact version " + version + " does not match " + process.env.OC2_VERSION)'
          rm -rf packages/opencode/dist
          mv "$TRANSFER_DIR" packages/opencode/dist
        env:
          OC2_VERSION: ${{ inputs.version }}

      - name: Publish native packages and wrapper
        run: ./packages/opencode/script/publish.ts
        env:
          OC2_VERSION: ${{ inputs.version }}
          OC2_CHANNEL: ${{ inputs.dist-tag }}
          NPM_CONFIG_PROVENANCE: true
