name: publish
run-name: "publish patch from ${{ github.sha }}"

on:
  workflow_dispatch:

concurrency:
  group: npm-publish
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  plan:
    if: github.repository == 'panwar-stack/oc2'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      version: ${{ steps.find.outputs.version || steps.create.outputs.version }}
      tag: ${{ steps.find.outputs.tag || steps.create.outputs.tag }}
      source: ${{ steps.find.outputs.source || steps.create.outputs.source }}
      complete: ${{ steps.find.outputs.complete }}
    steps:
      - name: Verify main dispatch
        shell: bash
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "workflow must be dispatched from refs/heads/main, got ${GITHUB_REF}" >&2
            exit 1
          fi

      - name: Checkout release commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Find release for source commit
        id: find
        shell: bash
        working-directory: packages/opencode
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASES_FILE: ${{ runner.temp }}/oc2-releases.json
        run: |
          set -euo pipefail
          gh api --paginate --slurp "repos/${GITHUB_REPOSITORY}/releases?per_page=100" > "$RELEASES_FILE"
          bun ./script/release-plan.ts >> "$GITHUB_OUTPUT"

      - name: Validate adopted workflow draft
        if: steps.find.outputs.state == 'blocked'
        id: adopt
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE: ${{ steps.find.outputs.source }}
          TAG: ${{ steps.find.outputs.tag }}
        run: |
          set -euo pipefail
          actual=$(gh api "repos/${GITHUB_REPOSITORY}/git/commits/${SOURCE}" --jq .sha)
          if [ "$actual" != "$SOURCE" ]; then
            echo "workflow draft source commit does not exist in this repository" >&2
            exit 1
          fi
          if ! git merge-base --is-ancestor "$SOURCE" "$GITHUB_SHA"; then
            echo "workflow draft source must be an ancestor of the dispatch commit" >&2
            exit 1
          fi

          remote_tag=$(git ls-remote --tags origin "refs/tags/${TAG}")
          if [ -z "$remote_tag" ]; then
            echo "create=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "create=false" >> "$GITHUB_OUTPUT"

      - name: Create missing adopted release tag
        if: steps.find.outputs.state == 'blocked' && steps.adopt.outputs.create == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TAG_RECOVERY_TOKEN }}
          SOURCE: ${{ steps.find.outputs.source }}
          TAG: ${{ steps.find.outputs.tag }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "RELEASE_TAG_RECOVERY_TOKEN is required to recover a missing adopted release tag" >&2
            exit 1
          fi
          gh api --method POST "repos/${GITHUB_REPOSITORY}/git/refs" \
            -f "ref=refs/tags/${TAG}" \
            -f "sha=${SOURCE}" > /dev/null

      - name: Verify adopted release tag
        if: steps.find.outputs.state == 'blocked'
        shell: bash
        env:
          SOURCE: ${{ steps.find.outputs.source }}
          TAG: ${{ steps.find.outputs.tag }}
        run: |
          set -euo pipefail
          verify_ref="refs/oc2-release-adopt/${TAG}"
          git fetch --no-tags origin "refs/tags/${TAG}:${verify_ref}"
          tag_commit=$(git rev-parse "${verify_ref}^{commit}")
          if [ "$tag_commit" != "$SOURCE" ]; then
            echo "workflow draft tag does not resolve to its source commit" >&2
            exit 1
          fi

      - name: Allocate patch and create draft release
        if: steps.find.outputs.state == 'missing'
        id: create
        shell: bash
        working-directory: packages/opencode
        env:
          GH_TOKEN: ${{ github.token }}
          MARKER: <!-- oc2-release-source:${{ github.sha }} -->
          TAGS_FILE: ${{ runner.temp }}/oc2-tags.txt
          RELEASES_FILE: ${{ runner.temp }}/oc2-releases.json
        run: |
          set -euo pipefail
          git ls-remote --tags origin 'refs/tags/v*' > "$TAGS_FILE"
          VERSION=$(bun ./script/release-plan.ts)
          TAG="v${VERSION}"
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --draft \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --generate-notes \
            --notes "$MARKER" \
            --fail-on-no-commits
          printf 'version=%s\ntag=%s\nsource=%s\n' "$VERSION" "$TAG" "$GITHUB_SHA" >> "$GITHUB_OUTPUT"

      - name: Create and verify release tag
        shell: bash
        env:
          SOURCE: ${{ steps.find.outputs.source || steps.create.outputs.source }}
          STATE: ${{ steps.find.outputs.state }}
          TAG: ${{ steps.find.outputs.tag || steps.create.outputs.tag }}
        run: |
          set -euo pipefail
          remote_tag=$(git ls-remote --tags origin "refs/tags/${TAG}")
          if [ -z "$remote_tag" ]; then
            if [ "$STATE" = "blocked" ]; then
              echo "adopted release tag disappeared after recovery" >&2
              exit 1
            fi
            git push origin "${SOURCE}:refs/tags/${TAG}"
          fi
          verify_ref="refs/oc2-release-check/${TAG}"
          git fetch --no-tags origin "refs/tags/${TAG}:${verify_ref}"
          tag_commit=$(git rev-parse "${verify_ref}^{commit}")
          if [ "$tag_commit" != "$SOURCE" ]; then
            echo "release tag must resolve to the planned source commit" >&2
            exit 1
          fi

  build:
    needs: plan
    if: needs.plan.outputs.complete != 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      unix-artifact: ${{ steps.artifacts.outputs.unix }}
      windows-artifact: ${{ steps.artifacts.outputs.windows }}
    steps:
      - name: Checkout release commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ needs.plan.outputs.source }}

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Build native packages
        run: ./packages/opencode/script/build.ts
        env:
          OC2_VERSION: ${{ needs.plan.outputs.version }}
          OC2_CHANNEL: latest
          OC2_RELEASE: true
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}

      - name: Validate built package set
        shell: bash
        run: |
          expected=$(printf '%s\n' \
            oc2-darwin-arm64 \
            oc2-darwin-x64 \
            oc2-darwin-x64-baseline \
            oc2-linux-arm64 \
            oc2-linux-arm64-musl \
            oc2-linux-x64 \
            oc2-linux-x64-baseline \
            oc2-linux-x64-baseline-musl \
            oc2-linux-x64-musl \
            oc2-windows-arm64 \
            oc2-windows-x64 \
            oc2-windows-x64-baseline)
          actual=$(find packages/opencode/dist -mindepth 1 -maxdepth 1 -type d -print | sed 's|.*/||' | sort)
          if [ "$actual" != "$expected" ]; then
            echo "unexpected native package set" >&2
            diff -u <(printf '%s\n' "$expected") <(printf '%s\n' "$actual")
            exit 1
          fi

          bun -e 'import { validateNativePackages } from "./packages/opencode/script/publish.ts"; const version = await validateNativePackages("packages/opencode/dist"); if (version !== process.env.OC2_VERSION) throw new Error("built version " + version + " does not match " + process.env.OC2_VERSION)'
        env:
          OC2_VERSION: ${{ needs.plan.outputs.version }}

      - name: Select artifact names
        id: artifacts
        shell: bash
        env:
          SOURCE: ${{ needs.plan.outputs.source }}
        run: |
          echo "unix=oc2-native-unix-${SOURCE}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"
          echo "windows=oc2-native-windows-${SOURCE}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

      - name: Upload Unix native packages
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ steps.artifacts.outputs.unix }}
          if-no-files-found: error
          retention-days: 7
          path: |
            packages/opencode/dist/oc2-darwin-arm64
            packages/opencode/dist/oc2-darwin-x64
            packages/opencode/dist/oc2-darwin-x64-baseline
            packages/opencode/dist/oc2-linux-arm64
            packages/opencode/dist/oc2-linux-arm64-musl
            packages/opencode/dist/oc2-linux-x64
            packages/opencode/dist/oc2-linux-x64-baseline
            packages/opencode/dist/oc2-linux-x64-baseline-musl
            packages/opencode/dist/oc2-linux-x64-musl

      - name: Upload unsigned Windows native packages
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ steps.artifacts.outputs.windows }}
          if-no-files-found: error
          retention-days: 7
          path: |
            packages/opencode/dist/oc2-windows-arm64
            packages/opencode/dist/oc2-windows-x64
            packages/opencode/dist/oc2-windows-x64-baseline

  publish:
    needs: [plan, build]
    if: needs.plan.outputs.complete != 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      TRANSFER_DIR: ${{ github.workspace }}/transfer/${{ needs.plan.outputs.source }}/${{ github.run_attempt }}/release
    steps:
      - name: Checkout release commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ needs.plan.outputs.source }}

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - name: Authenticate with npm
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Download Unix native packages
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ needs.build.outputs.unix-artifact }}
          path: ${{ env.TRANSFER_DIR }}

      - name: Download unsigned Windows native packages
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ needs.build.outputs.windows-artifact }}
          path: ${{ env.TRANSFER_DIR }}

      - name: Validate publish package set
        shell: bash
        run: |
          expected=$(printf '%s\n' \
            oc2-darwin-arm64 \
            oc2-darwin-x64 \
            oc2-darwin-x64-baseline \
            oc2-linux-arm64 \
            oc2-linux-arm64-musl \
            oc2-linux-x64 \
            oc2-linux-x64-baseline \
            oc2-linux-x64-baseline-musl \
            oc2-linux-x64-musl \
            oc2-windows-arm64 \
            oc2-windows-x64 \
            oc2-windows-x64-baseline)
          actual=$(find "$TRANSFER_DIR" -mindepth 1 -maxdepth 1 -type d -print | sed 's|.*/||' | sort)
          if [ "$actual" != "$expected" ]; then
            echo "unexpected extracted native package set" >&2
            diff -u <(printf '%s\n' "$expected") <(printf '%s\n' "$actual")
            exit 1
          fi

          bun -e 'import { validateNativePackages } from "./packages/opencode/script/publish.ts"; const version = await validateNativePackages(process.env.TRANSFER_DIR); if (version !== process.env.OC2_VERSION) throw new Error("artifact version " + version + " does not match " + process.env.OC2_VERSION)'
          rm -rf packages/opencode/dist
          mv "$TRANSFER_DIR" packages/opencode/dist
        env:
          OC2_VERSION: ${{ needs.plan.outputs.version }}

      - name: Publish native packages and wrapper
        run: ./packages/opencode/script/publish.ts
        env:
          OC2_VERSION: ${{ needs.plan.outputs.version }}
          OC2_CHANNEL: latest
          NPM_CONFIG_PROVENANCE: ${{ needs.plan.outputs.source == github.sha }}

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.plan.outputs.tag }}
          SOURCE: ${{ needs.plan.outputs.source }}
          MARKER: <!-- oc2-release-source:${{ needs.plan.outputs.source }} -->
          RELEASE_FILE: ${{ runner.temp }}/oc2-release.json
        run: |
          set -euo pipefail
          verify_ref="refs/oc2-release-publish/${TAG}"
          git fetch --no-tags origin "refs/tags/${TAG}:${verify_ref}"
          tag_commit=$(git rev-parse "${verify_ref}^{commit}")
          head_commit=$(git rev-parse HEAD)
          if [ "$tag_commit" != "$SOURCE" ] || [ "$head_commit" != "$SOURCE" ]; then
            echo "release tag, checkout, and planned source must resolve to the same commit" >&2
            exit 1
          fi

          gh release view "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --json body,isDraft,isPrerelease,tagName,targetCommitish > "$RELEASE_FILE"
          node <<'NODE'
          const fs = require("node:fs")
          const release = JSON.parse(fs.readFileSync(process.env.RELEASE_FILE, "utf8"))
          if (release.tagName !== process.env.TAG) throw new Error("Release tag changed before publication")
          if (release.targetCommitish !== process.env.SOURCE) {
            throw new Error("Release source changed before publication")
          }
          if (typeof release.body !== "string" || !release.body.includes(process.env.MARKER)) {
            throw new Error("Release source marker changed before publication")
          }
          if (release.isPrerelease) throw new Error("Release must not be a prerelease")
          if (typeof release.isDraft !== "boolean") throw new Error("unexpected Release draft state")
          NODE
          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false --latest
