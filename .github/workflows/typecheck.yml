name: typecheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
    types: [checks_requested]
  workflow_dispatch:

permissions: {}

jobs:
  typecheck:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Determine CI scope
        id: scope
        run: ./script/ci-scope.ts

      - name: Check documentation
        run: bun run docs:check

      - name: Cache Turbo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: node_modules/.cache/turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('turbo.json', '**/package.json') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('turbo.json', '**/package.json') }}-
            turbo-${{ runner.os }}-

      - name: Check package boundaries
        run: bun run check:packages

      - name: Check generated artifacts
        if: steps.scope.outputs.check_generated == 'true'
        run: bun run check:generated

      - name: Typecheck automation security scripts
        run: bun run typecheck:automation

      - name: Run typecheck
        if: steps.scope.outputs.run_typecheck == 'true'
        run: bun turbo typecheck ${{ steps.scope.outputs.turbo_filter }}
