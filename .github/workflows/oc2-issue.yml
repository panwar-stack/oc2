name: oc2 issue

on:
  issues:
    types: [opened, labeled]

permissions: {}

concurrency:
  group: oc2-issue-${{ github.repository_id }}-${{ github.event.issue.number }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  admit:
    if: github.repository == 'panwar-stack/oc2' && vars.OC2_AUTOMATION_ENABLED == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
      issues: write
    outputs:
      state: ${{ steps.gate.outputs.state }}
      execute: ${{ steps.gate.outputs.execute }}
      key: ${{ steps.gate.outputs.key }}
      base_sha: ${{ steps.gate.outputs.base_sha }}
    steps:
      - name: Checkout workflow source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - name: Admit issue event
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MARKER_BOT_ID: ${{ vars.OC2_MARKER_BOT_ID }}
          PUBLISHER_BOT_ID: ${{ vars.OC2_PUBLISHER_BOT_ID }}
          ALLOWED_BOT_IDS: ${{ vars.OC2_ALLOWED_BOT_IDS }}
        run: |
          set -euo pipefail
          if [[ ! "$MARKER_BOT_ID" =~ ^[1-9][0-9]*$ ]] || [[ ! "$PUBLISHER_BOT_ID" =~ ^[1-9][0-9]*$ ]]; then
            echo "invalid automation bot identity configuration" >&2
            exit 1
          fi
          args=(
            admit
            --event-file "$GITHUB_EVENT_PATH"
            --result-file "$RUNNER_TEMP/admission.json"
            --bot-id "$MARKER_BOT_ID"
            --publisher-bot-id "$PUBLISHER_BOT_ID"
          )
          if [ -n "$ALLOWED_BOT_IDS" ]; then
            if [[ ! "$ALLOWED_BOT_IDS" =~ ^[1-9][0-9]*(,[1-9][0-9]*)*$ ]]; then
              echo "invalid automation bot allowlist configuration" >&2
              exit 1
            fi
            IFS=, read -r -a ids <<< "$ALLOWED_BOT_IDS"
            declare -A seen=()
            for id in "${ids[@]}"; do
              if [[ -n "${seen[$id]:-}" ]]; then
                echo "invalid automation bot allowlist configuration" >&2
                exit 1
              fi
              seen[$id]=1
              args+=(--allow-bot-id "$id")
            done
          fi
          bun --config=/dev/null --no-env-file --no-install script/oc2-issue.ts "${args[@]}"

      - name: Validate admission gate
        id: gate
        shell: bash
        env:
          REPOSITORY_ID: ${{ github.repository_id }}
        run: |
          set -euo pipefail
          bun --config=/dev/null --no-env-file --no-install script/oc2-automation-workflow.ts admission \
            --admission "$RUNNER_TEMP/admission.json" \
            --event-file "$GITHUB_EVENT_PATH" \
            --repository "$GITHUB_REPOSITORY" \
            --repository-id "$REPOSITORY_ID" \
            --github-output "$GITHUB_OUTPUT"

      - name: Build trusted publication helper
        if: steps.gate.outputs.execute == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/trusted"
          bun build script/oc2-publish.ts --target=bun --outfile "$RUNNER_TEMP/trusted/oc2-publish.js"

      - name: Upload admission artifact
        if: steps.gate.outputs.execute == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: oc2-admission-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/admission.json
          if-no-files-found: error
          include-hidden-files: false
          retention-days: 1

      - name: Upload trusted publication helper
        if: steps.gate.outputs.execute == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: oc2-trusted-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/trusted/oc2-publish.js
          if-no-files-found: error
          include-hidden-files: false
          retention-days: 1

      - name: Delete admission state
        if: always()
        shell: bash
        run: rm -rf -- "$RUNNER_TEMP/admission.json" "$RUNNER_TEMP/trusted"

  ingest:
    needs: admit
    if: github.repository == 'panwar-stack/oc2' && vars.OC2_AUTOMATION_ENABLED == 'true' && needs.admit.outputs.execute == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      issues: read
    outputs:
      state: ${{ steps.gate.outputs.state }}
      execute: ${{ steps.gate.outputs.execute }}
    steps:
      - name: Checkout workflow source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - name: Download admission artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: oc2-admission-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/admission

      - name: Revalidate admission artifact
        shell: bash
        env:
          ADMISSION_KEY: ${{ needs.admit.outputs.key }}
          BASE_SHA: ${{ needs.admit.outputs.base_sha }}
          REPOSITORY_ID: ${{ github.repository_id }}
        run: |
          set -euo pipefail
          bun --config=/dev/null --no-env-file --no-install script/oc2-automation-workflow.ts validate-admission \
            --admission "$RUNNER_TEMP/admission/admission.json" \
            --event-file "$GITHUB_EVENT_PATH" \
            --repository "$GITHUB_REPOSITORY" \
            --repository-id "$REPOSITORY_ID" \
            --base-sha "$BASE_SHA" \
            --key "$ADMISSION_KEY"

      - name: Ingest admitted issue snapshot
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          bun --config=/dev/null --no-env-file --no-install script/oc2-issue.ts ingest \
            --event-file "$GITHUB_EVENT_PATH" \
            --admission-file "$RUNNER_TEMP/admission/admission.json" \
            --bundle-dir "$RUNNER_TEMP/issue-bundle" \
            --result-file "$RUNNER_TEMP/ingest.json"

      - name: Validate ingestion gate
        id: gate
        shell: bash
        env:
          ADMISSION_KEY: ${{ needs.admit.outputs.key }}
          BASE_SHA: ${{ needs.admit.outputs.base_sha }}
          REPOSITORY_ID: ${{ github.repository_id }}
        run: |
          set -euo pipefail
          bun --config=/dev/null --no-env-file --no-install script/oc2-automation-workflow.ts ingest \
            --admission "$RUNNER_TEMP/admission/admission.json" \
            --bundle-dir "$RUNNER_TEMP/issue-bundle" \
            --result "$RUNNER_TEMP/ingest.json" \
            --repository "$GITHUB_REPOSITORY" \
            --repository-id "$REPOSITORY_ID" \
            --base-sha "$BASE_SHA" \
            --key "$ADMISSION_KEY" \
            --checkout "$GITHUB_WORKSPACE" \
            --github-output "$GITHUB_OUTPUT"

      - name: Upload issue bundle
        if: steps.gate.outputs.execute == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: oc2-issue-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/issue-bundle/**
          if-no-files-found: error
          include-hidden-files: false
          retention-days: 1

      - name: Delete ingestion state
        if: always()
        shell: bash
        run: rm -rf -- "$RUNNER_TEMP/admission" "$RUNNER_TEMP/ingest.json" "$RUNNER_TEMP/issue-bundle"

  generate:
    needs: [admit, ingest]
    if: github.repository == 'panwar-stack/oc2' && vars.OC2_AUTOMATION_ENABLED == 'true' && needs.admit.outputs.execute == 'true' && needs.ingest.outputs.execute == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    permissions:
      actions: read
      contents: read
    outputs:
      state: ${{ steps.outcome.outputs.state }}
      execute: ${{ steps.outcome.outputs.execute }}
    steps:
      - name: Checkout exact admitted base
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ needs.admit.outputs.base_sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - name: Download admission artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: oc2-admission-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/admission

      - name: Download issue bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: oc2-issue-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/issue-bundle

      - name: Revalidate generation inputs
        shell: bash
        env:
          ADMISSION_KEY: ${{ needs.admit.outputs.key }}
          BASE_SHA: ${{ needs.admit.outputs.base_sha }}
          REPOSITORY_ID: ${{ github.repository_id }}
        run: |
          set -euo pipefail
          bun --config=/dev/null --no-env-file --no-install script/oc2-automation-workflow.ts validate-input \
            --admission "$RUNNER_TEMP/admission/admission.json" \
            --bundle-dir "$RUNNER_TEMP/issue-bundle" \
            --repository "$GITHUB_REPOSITORY" \
            --repository-id "$REPOSITORY_ID" \
            --base-sha "$BASE_SHA" \
            --key "$ADMISSION_KEY" \
            --checkout "$GITHUB_WORKSPACE"

      - name: Initialize generation phase
        shell: bash
        run: printf '%s\n' install_failed > "$RUNNER_TEMP/generation-phase"

      - name: Install verified OC2 release
        id: install
        continue-on-error: true
        shell: bash
        env:
          OC2_VERSION: ${{ vars.OC2_VERSION }}
          OC2_INSTALLER_SHA256: ${{ vars.OC2_INSTALLER_SHA256 }}
          OC2_ASSET_SHA256_LINUX_X64: ${{ vars.OC2_ASSET_SHA256_LINUX_X64 }}
        run: |
          set -euo pipefail
          bun --config=/dev/null --no-env-file --no-install script/oc2-automation-workflow.ts config \
            --version "$OC2_VERSION" \
            --installer-sha256 "$OC2_INSTALLER_SHA256" \
            --asset-sha256 "$OC2_ASSET_SHA256_LINUX_X64"
          state="$RUNNER_TEMP/oc2-state"
          installer="$RUNNER_TEMP/oc2-installer"
          mkdir -p \
            "$state/home" \
            "$state/tmp" \
            "$state/xdg-cache" \
            "$state/xdg-config" \
            "$state/xdg-data" \
            "$state/xdg-state"
          chmod 700 \
            "$state" \
            "$state/home" \
            "$state/tmp" \
            "$state/xdg-cache" \
            "$state/xdg-config" \
            "$state/xdg-data" \
            "$state/xdg-state"
          curl \
            --fail \
            --silent \
            --show-error \
            --location \
            --proto '=https' \
            --proto-redir '=https' \
            --tlsv1.2 \
            --max-redirs 3 \
            --connect-timeout 10 \
            --max-time 120 \
            --retry 2 \
            --retry-all-errors \
            --output "$installer" \
            "https://raw.githubusercontent.com/panwar-stack/oc2/v${OC2_VERSION}/install"
          printf '%s  %s\n' "$OC2_INSTALLER_SHA256" "$installer" > "$RUNNER_TEMP/oc2-installer.sha256"
          sha256sum --check --status "$RUNNER_TEMP/oc2-installer.sha256"
          HOME="$state/home" \
          XDG_CACHE_HOME="$state/xdg-cache" \
          XDG_CONFIG_HOME="$state/xdg-config" \
          XDG_DATA_HOME="$state/xdg-data" \
          XDG_STATE_HOME="$state/xdg-state" \
          TMPDIR="$state/tmp" \
          OC2_ASSET_SHA256="$OC2_ASSET_SHA256_LINUX_X64" \
            bash "$installer" --version "$OC2_VERSION" --no-modify-path \
              > "$state/installer.stdout" 2> "$state/installer.stderr"
          actual_version=$(HOME="$state/home" "$state/home/.oc2/bin/oc2" --version 2> "$state/version.stderr")
          if [ "$actual_version" != "$OC2_VERSION" ]; then
            echo "installed OC2 version mismatch" >&2
            exit 1
          fi

      - name: Initialize model phase
        if: steps.install.outcome == 'success'
        shell: bash
        run: printf '%s\n' model_failed > "$RUNNER_TEMP/generation-phase"

      - name: Run isolated OC2 generation
        id: model
        if: steps.install.outcome == 'success'
        continue-on-error: true
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OC2_OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          bun --config=/dev/null --no-env-file --no-install script/oc2-automation-workflow.ts run \
            --admission "$RUNNER_TEMP/admission/admission.json" \
            --bundle-dir "$RUNNER_TEMP/issue-bundle" \
            --checkout "$GITHUB_WORKSPACE" \
            --oc2 "$RUNNER_TEMP/oc2-state/home/.oc2/bin/oc2" \
            --state-dir "$RUNNER_TEMP/oc2-state" \
            --phase-file "$RUNNER_TEMP/generation-phase"

      - name: Build generation artifact
        id: finalize
        if: steps.model.outcome == 'success'
        continue-on-error: true
        shell: bash
        env:
          OC2_VERSION: ${{ vars.OC2_VERSION }}
        run: |
          set -euo pipefail
          bun --config=/dev/null --no-env-file --no-install script/oc2-automation-workflow.ts finalize \
            --admission "$RUNNER_TEMP/admission/admission.json" \
            --checkout "$GITHUB_WORKSPACE" \
            --cli-version "$OC2_VERSION" \
            --output-dir "$RUNNER_TEMP/generation" \
            --state-dir "$RUNNER_TEMP/oc2-state" \
            --github-output "$GITHUB_OUTPUT"

      - name: Validate generated patch
        id: validate
        if: steps.finalize.outcome == 'success' && steps.finalize.outputs.execute == 'true'
        continue-on-error: true
        shell: bash
        env:
          BASE_SHA: ${{ needs.admit.outputs.base_sha }}
          REPOSITORY_ID: ${{ github.repository_id }}
        run: |
          set -euo pipefail
          bun --config=/dev/null --no-env-file --no-install script/oc2-verify.ts validate \
            --generation "$RUNNER_TEMP/generation/generation.json" \
            --patch "$RUNNER_TEMP/generation/changes.patch" \
            --repository "$GITHUB_REPOSITORY" \
            --repository-id "$REPOSITORY_ID" \
            --base-sha "$BASE_SHA"

      - name: Classify generation outcome
        id: outcome
        if: always()
        shell: bash
        env:
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          MODEL_OUTCOME: ${{ steps.model.outcome }}
          FINALIZE_OUTCOME: ${{ steps.finalize.outcome }}
          FINALIZE_STATE: ${{ steps.finalize.outputs.state }}
          VALIDATE_OUTCOME: ${{ steps.validate.outcome }}
        run: |
          set -euo pipefail
          state=patch_rejected
          if [ "$INSTALL_OUTCOME" != success ]; then
            state=install_failed
          elif [ "$MODEL_OUTCOME" != success ]; then
            state=$(cat "$RUNNER_TEMP/generation-phase")
            case "$state" in
              permission_denied|tool_failed|model_failed) ;;
              *) state=model_failed ;;
            esac
          elif [ "$FINALIZE_OUTCOME" != success ]; then
            state=patch_rejected
          elif [ "$FINALIZE_STATE" = no_changes ]; then
            state=no_changes
          elif [ "$VALIDATE_OUTCOME" != success ]; then
            state=patch_rejected
          else
            state=generated
          fi
          printf 'state=%s\n' "$state" >> "$GITHUB_OUTPUT"
          if [ "$state" = generated ]; then
            printf 'execute=true\n' >> "$GITHUB_OUTPUT"
          else
            printf 'execute=false\n' >> "$GITHUB_OUTPUT"
          fi
          case "$state" in
            generated|no_changes) ;;
            *) exit 1 ;;
          esac

      - name: Upload generation artifact
        if: steps.outcome.outputs.execute == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: oc2-generation-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/generation/generation.json
            ${{ runner.temp }}/generation/changes.patch
          if-no-files-found: error
          include-hidden-files: false
          retention-days: 1

      - name: Delete all generation state
        if: always()
        shell: bash
        run: |
          rm -rf -- \
            "$RUNNER_TEMP/admission" \
            "$RUNNER_TEMP/issue-bundle" \
            "$RUNNER_TEMP/generation" \
            "$RUNNER_TEMP/oc2-state"
          rm -f -- "$RUNNER_TEMP/oc2-installer" "$RUNNER_TEMP/oc2-installer.sha256" "$RUNNER_TEMP/generation-phase"

  verify:
    needs: [admit, generate]
    if: github.repository == 'panwar-stack/oc2' && vars.OC2_AUTOMATION_ENABLED == 'true' && needs.admit.outputs.execute == 'true' && needs.generate.outputs.execute == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    permissions:
      actions: read
      contents: read
    outputs:
      state: ${{ steps.outcome.outputs.state }}
      execute: ${{ steps.outcome.outputs.execute }}
    steps:
      - name: Checkout exact admitted base
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ needs.admit.outputs.base_sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - name: Download exact generation artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: oc2-generation-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/generation

      - name: Verify generated patch
        id: verify
        continue-on-error: true
        shell: bash
        env:
          BASE_SHA: ${{ needs.admit.outputs.base_sha }}
          REPOSITORY_ID: ${{ github.repository_id }}
          VERIFY_IMAGE: ${{ vars.OC2_VERIFY_IMAGE }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/verification"
          bun --config=/dev/null --no-env-file --no-install script/oc2-verify.ts verify \
            --generation "$RUNNER_TEMP/generation/generation.json" \
            --patch "$RUNNER_TEMP/generation/changes.patch" \
            --repository "$GITHUB_REPOSITORY" \
            --repository-id "$REPOSITORY_ID" \
            --base-sha "$BASE_SHA" \
            --image "$VERIFY_IMAGE" \
            --output "$RUNNER_TEMP/verification/verification.json"

      - name: Classify verification outcome
        id: outcome
        if: always()
        shell: bash
        env:
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
        run: |
          set -euo pipefail
          if [ "$VERIFY_OUTCOME" = success ]; then
            printf 'state=verified\nexecute=true\n' >> "$GITHUB_OUTPUT"
          else
            printf 'state=verification_failed\nexecute=false\n' >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Upload verification artifact
        if: steps.outcome.outputs.execute == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: oc2-verification-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/verification/verification.json
          if-no-files-found: error
          include-hidden-files: false
          retention-days: 1

      - name: Delete verification state
        if: always()
        shell: bash
        run: rm -rf -- "$RUNNER_TEMP/generation" "$RUNNER_TEMP/verification"

  publish:
    needs: [admit, generate, verify]
    if: github.repository == 'panwar-stack/oc2' && vars.OC2_AUTOMATION_ENABLED == 'true' && needs.admit.outputs.execute == 'true' && needs.generate.outputs.execute == 'true' && needs.verify.outputs.execute == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
    outputs:
      state: ${{ steps.publish.outputs.state }}
      execute: ${{ steps.publish.outputs.execute }}
      pr_id: ${{ steps.publish.outputs.pr_id }}
      pr_number: ${{ steps.publish.outputs.pr_number }}
      pr_url: ${{ steps.publish.outputs.pr_url }}
      branch: ${{ steps.publish.outputs.branch }}
      head_sha: ${{ steps.publish.outputs.head_sha }}
    steps:
      - name: Checkout exact admitted base
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ needs.admit.outputs.base_sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - name: Download exact admission artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: oc2-admission-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/admission

      - name: Download exact generation artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: oc2-generation-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/generation

      - name: Download exact verification artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: oc2-verification-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/verification

      - name: Download trusted publication helper
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: oc2-trusted-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/trusted

      - name: Revalidate and seal publication inputs
        shell: bash
        working-directory: ${{ runner.temp }}
        env:
          ADMISSION_KEY: ${{ needs.admit.outputs.key }}
          BASE_SHA: ${{ needs.admit.outputs.base_sha }}
          REPOSITORY_ID: ${{ github.repository_id }}
        run: |
          set -euo pipefail
          bun --config=/dev/null --no-env-file --no-install "$RUNNER_TEMP/trusted/oc2-publish.js" prepare \
            --admission "$RUNNER_TEMP/admission/admission.json" \
            --generation "$RUNNER_TEMP/generation/generation.json" \
            --patch "$RUNNER_TEMP/generation/changes.patch" \
            --verification "$RUNNER_TEMP/verification/verification.json" \
            --output "$RUNNER_TEMP/publication.json" \
            --repository "$GITHUB_REPOSITORY" \
            --repository-id "$REPOSITORY_ID" \
            --base-sha "$BASE_SHA" \
            --key "$ADMISSION_KEY" \
            --checkout "$GITHUB_WORKSPACE"

      - name: Create repository-scoped publisher token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ vars.OC2_APP_ID }}
          private-key: ${{ secrets.OC2_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-pull-requests: write

      - name: Publish verified change
        id: publish
        shell: bash
        working-directory: ${{ runner.temp }}
        env:
          OC2_PUBLISH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          PUBLISHER_BOT_ID: ${{ vars.OC2_PUBLISHER_BOT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}
        run: |
          set -euo pipefail
          bun --config=/dev/null --no-env-file --no-install "$RUNNER_TEMP/trusted/oc2-publish.js" publish \
            --publication "$RUNNER_TEMP/publication.json" \
            --admission "$RUNNER_TEMP/admission/admission.json" \
            --generation "$RUNNER_TEMP/generation/generation.json" \
            --patch "$RUNNER_TEMP/generation/changes.patch" \
            --verification "$RUNNER_TEMP/verification/verification.json" \
            --checkout "$GITHUB_WORKSPACE" \
            --run-url "$RUN_URL" \
            --app-slug "$APP_SLUG" \
            --publisher-bot-id "$PUBLISHER_BOT_ID" \
            --github-output "$GITHUB_OUTPUT"

      - name: Delete publication state
        if: always()
        shell: bash
        run: rm -rf -- "$RUNNER_TEMP/admission" "$RUNNER_TEMP/generation" "$RUNNER_TEMP/verification" "$RUNNER_TEMP/trusted" "$RUNNER_TEMP/publication.json"

  auto_merge:
    needs: [admit, publish]
    if: github.repository == 'panwar-stack/oc2' && vars.OC2_AUTOMATION_ENABLED == 'true' && needs.admit.outputs.execute == 'true' && needs.publish.outputs.state == 'pr_opened' && needs.publish.outputs.execute == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
    outputs:
      state: ${{ steps.enable.outputs.state }}
      execute: ${{ steps.enable.outputs.execute }}
    steps:
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Download trusted publication helper
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: oc2-trusted-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/trusted

      - name: Create ruleset settings App token
        id: settings-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ vars.OC2_APP_ID }}
          private-key: ${{ secrets.OC2_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-administration: read
          permission-contents: read
          permission-pull-requests: read

      - name: Create exact auto-merge App token
        id: merge-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ vars.OC2_APP_ID }}
          private-key: ${{ secrets.OC2_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-pull-requests: write
          permission-contents: read

      - name: Validate settings and enable exact-head auto-merge
        id: enable
        shell: bash
        working-directory: ${{ runner.temp }}
        env:
          OC2_SETTINGS_TOKEN: ${{ steps.settings-token.outputs.token }}
          OC2_PUBLISH_TOKEN: ${{ steps.merge-token.outputs.token }}
          REPOSITORY_ID: ${{ github.repository_id }}
          APP_ID: ${{ vars.OC2_APP_ID }}
          PUBLISHER_BOT_ID: ${{ vars.OC2_PUBLISHER_BOT_ID }}
          PR_ID: ${{ needs.publish.outputs.pr_id }}
          PR_NUMBER: ${{ needs.publish.outputs.pr_number }}
          BRANCH: ${{ needs.publish.outputs.branch }}
          HEAD_SHA: ${{ needs.publish.outputs.head_sha }}
        run: |
          set -euo pipefail
          bun --config=/dev/null --no-env-file --no-install "$RUNNER_TEMP/trusted/oc2-publish.js" auto-merge \
            --repository "$GITHUB_REPOSITORY" \
            --repository-id "$REPOSITORY_ID" \
            --app-id "$APP_ID" \
            --publisher-bot-id "$PUBLISHER_BOT_ID" \
            --pr-id "$PR_ID" \
            --pr-number "$PR_NUMBER" \
            --branch "$BRANCH" \
            --head-sha "$HEAD_SHA" \
            --github-output "$GITHUB_OUTPUT"

      - name: Delete auto-merge state
        if: always()
        shell: bash
        run: rm -rf -- "$RUNNER_TEMP/trusted"

  status:
    needs: [admit, ingest, generate, verify, publish, auto_merge]
    if: always() && github.repository == 'panwar-stack/oc2' && vars.OC2_AUTOMATION_ENABLED == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout trusted status source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - name: Update fixed terminal status
        shell: bash
        working-directory: ${{ runner.temp }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MARKER_BOT_ID: ${{ vars.OC2_MARKER_BOT_ID }}
          REPOSITORY_ID: ${{ github.repository_id }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          PR_ID: ${{ needs.publish.outputs.pr_id || 'none' }}
          ADMIT_RESULT: ${{ needs.admit.result }}
          INGEST_RESULT: ${{ needs.ingest.result }}
          INGEST_STATE: ${{ needs.ingest.outputs.state }}
          GENERATE_RESULT: ${{ needs.generate.result }}
          GENERATE_STATE: ${{ needs.generate.outputs.state }}
          VERIFY_RESULT: ${{ needs.verify.result }}
          VERIFY_STATE: ${{ needs.verify.outputs.state }}
          PUBLISH_RESULT: ${{ needs.publish.result }}
          PUBLISH_STATE: ${{ needs.publish.outputs.state }}
          AUTO_MERGE_RESULT: ${{ needs.auto_merge.result }}
          AUTO_MERGE_STATE: ${{ needs.auto_merge.outputs.state }}
        run: |
          set -euo pipefail
          bun --config=/dev/null --no-env-file --no-install "$GITHUB_WORKSPACE/script/oc2-publish.ts" status \
            --event-file "$GITHUB_EVENT_PATH" \
            --repository "$GITHUB_REPOSITORY" \
            --repository-id "$REPOSITORY_ID" \
            --run-id "$RUN_ID" \
            --run-attempt "$RUN_ATTEMPT" \
            --bot-id "$MARKER_BOT_ID" \
            --admit-result "$ADMIT_RESULT" \
            --ingest-result "$INGEST_RESULT" \
            --ingest-state "${INGEST_STATE:-none}" \
            --generate-result "$GENERATE_RESULT" \
            --generate-state "${GENERATE_STATE:-none}" \
            --verify-result "$VERIFY_RESULT" \
            --verify-state "${VERIFY_STATE:-none}" \
            --publish-result "$PUBLISH_RESULT" \
            --publish-state "${PUBLISH_STATE:-none}" \
            --auto-merge-result "$AUTO_MERGE_RESULT" \
            --auto-merge-state "${AUTO_MERGE_STATE:-none}" \
            --pr-id "$PR_ID"
