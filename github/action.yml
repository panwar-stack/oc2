name: "oc2 GitHub Action"
description: "Run oc2 in GitHub Actions workflows"
branding:
  icon: "code"
  color: "orange"

inputs:
  model:
    description: "Model to use"
    required: true

  agent:
    description: "Agent to use. Must be a primary agent. Falls back to default_agent from config or 'build' if not found."
    required: false

  share:
    description: "Share the oc2 session (defaults to true for public repos)"
    required: false

  prompt:
    description: "Custom prompt to override the default prompt"
    required: false

  use_github_token:
    description: "Use GITHUB_TOKEN directly instead of the oc2 App token exchange. When true, skips OIDC and uses the GITHUB_TOKEN env var."
    required: false
    default: "false"

  mentions:
    description: "Comma-separated list of trigger phrases (case-insensitive). Defaults to '/oc2,/opencode,/oc'"
    required: false

  variant:
    description: "Model variant for provider-specific reasoning effort (e.g., high, max, minimal)"
    required: false

  oidc_base_url:
    description: "Base URL for OIDC token exchange API. Only required when running a custom GitHub App install. Defaults to https://api.oc2.ai"
    required: false

runs:
  using: "composite"
  steps:
    - name: Get oc2 version
      id: version
      shell: bash
      run: |
        VERSION=$(curl -sf https://api.github.com/repos/anomalyco/opencode/releases/latest | grep -o '"tag_name": *"[^"]*"' | cut -d'"' -f4)
        echo "version=${VERSION:-latest}" >> $GITHUB_OUTPUT

    - name: Cache oc2
      id: cache
      uses: actions/cache@v4
      with:
        path: ~/.oc2/bin
        key: oc2-${{ runner.os }}-${{ runner.arch }}-${{ steps.version.outputs.version }}

    - name: Install oc2
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: curl -fsSL https://oc2.ai/install | bash

    - name: Add oc2 to PATH
      shell: bash
      run: echo "$HOME/.oc2/bin" >> $GITHUB_PATH

    - name: Run oc2
      shell: bash
      id: run_oc2
      run: oc2 github run
      env:
        MODEL: ${{ inputs.model }}
        AGENT: ${{ inputs.agent }}
        SHARE: ${{ inputs.share }}
        PROMPT: ${{ inputs.prompt }}
        USE_GITHUB_TOKEN: ${{ inputs.use_github_token }}
        MENTIONS: ${{ inputs.mentions }}
        VARIANT: ${{ inputs.variant }}
        OIDC_BASE_URL: ${{ inputs.oidc_base_url }}
